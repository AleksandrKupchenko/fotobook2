{% load static %}
<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>FotoBook — demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <!-- --------------------------
       Шапка
  -------------------------- -->
  <header>
    <div class="header-container container">
      <a href="{% url 'home' %}" class="logo">Fotobook</a>
      <nav>
        <div class="nav-links">
          <a href="#" class="nav-item">Каталог</a>
          <a href="#" class="nav-item">Схема работы</a>
          <a href="#" class="nav-item">О нас</a>
          <a href="#" class="nav-item">Новости</a>
          <a href="#" class="nav-item">Контакты</a>
        </div>
        <div class="user-links">
          {% if user.is_authenticated %}
            <span class="username">{{ user.username }}</span>
            <a href="{% url 'dashboard' %}" class="btn">Личный кабинет</a>
            <form action="{% url 'logout' %}" method="post" class="logout-form">
              {% csrf_token %}
              <button type="submit">Выйти</button>
            </form>
          {% else %}
            <a href="{% url 'login' %}" class="btn">Войти</a>
          {% endif %}
        </div>
      </nav>
    </div>
  </header>

  <!-- --------------------------
       Основной контент
  -------------------------- -->
  <main class="container">
    {% block content %}
    {% endblock %}
  </main>

  <!-- --------------------------
       Подвал
  -------------------------- -->
  <footer>
    <div class="container">
      <p>Demo site — фотокниги © 2025</p>
    </div>
  </footer>
</body>
</html>
